<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#2C4368"/>

  <!-- A-shaped antenna -->
  <path d="M20 52 L32 20 L44 52"
        stroke="white"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Top node -->
  <circle cx="32" cy="18" r="3" fill="white"/>

  <!-- Concentric RF arcs centered at (32,18) -->
  <path d="M24 18 A8 8 0 0 1 40 18"
        stroke="white"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

  <path d="M18 18 A14 14 0 0 1 46 18"
        stroke="white"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

</svg>
